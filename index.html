<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BrokeBuddy — AI Financial Survival Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030712;--bg2:#0a0f1e;--bg3:#0d1533;
  --cyan:#00f5ff;--pink:#ff2d7a;--purple:#a855f7;--green:#00ff88;--yellow:#ffd700;
  --text:#e2e8f0;--muted:#64748b;
  --card:#0f1729;--border:#1e2d4a;
  --gradient:linear-gradient(135deg,#00f5ff,#a855f7);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,245,255,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(168,85,247,.04) 0%,transparent 60%);pointer-events:none;z-index:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:2px}

/* GRID OVERLAY */
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* TYPOGRAPHY */
.font-mono{font-family:'Share Tech Mono',monospace}
.font-display{font-family:'Orbitron',monospace}

/* LAYOUT */
.app{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{width:240px;background:rgba(10,15,30,.95);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.main{margin-left:240px;flex:1;padding:24px;max-width:1400px}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}}

/* SIDEBAR */
.logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(0,245,255,.3)}
.logo-text{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:2px}
.nav{padding:16px 12px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:14px;font-weight:600;letter-spacing:.5px;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:rgba(0,245,255,.05);color:var(--text);border-color:rgba(0,245,255,.1)}
.nav-item.active{background:rgba(0,245,255,.1);color:var(--cyan);border-color:rgba(0,245,255,.2)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px}
.avatar{width:32px;height:32px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bg);flex-shrink:0}
.user-details{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;truncate:ellipsis;white-space:nowrap;overflow:hidden}
.user-tier{font-size:10px;color:var(--cyan);font-family:'Share Tech Mono',monospace}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,.3),transparent)}
.card-title{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-bottom:8px}
.card-value{font-family:'Orbitron',monospace;font-size:28px;font-weight:700}

/* GRID LAYOUTS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;border:none;letter-spacing:.5px;font-family:'Rajdhani',sans-serif}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--bg);box-shadow:0 0 20px rgba(0,245,255,.2)}
.btn-primary:hover{box-shadow:0 0 30px rgba(0,245,255,.4);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:rgba(255,45,122,.1);border:1px solid rgba(255,45,122,.3);color:var(--pink)}
.btn-sm{padding:6px 12px;font-size:12px}

/* INPUTS */
.input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.input-label{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace}
.input{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'Rajdhani',sans-serif;transition:all .2s;width:100%}
.input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 15px rgba(0,245,255,.1)}
.input::placeholder{color:var(--muted)}
select.input{cursor:pointer}
select.input option{background:var(--bg3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;font-family:'Share Tech Mono',monospace}
.badge-cyan{background:rgba(0,245,255,.1);color:var(--cyan);border:1px solid rgba(0,245,255,.2)}
.badge-pink{background:rgba(255,45,122,.1);color:var(--pink);border:1px solid rgba(255,45,122,.2)}
.badge-green{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.badge-yellow{background:rgba(255,215,0,.1);color:var(--yellow);border:1px solid rgba(255,215,0,.2)}
.badge-purple{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}

/* HEALTH RING */
.health-ring-container{position:relative;width:140px;height:140px;margin:0 auto}
.health-ring-svg{transform:rotate(-90deg)}
.health-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.health-score-num{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;line-height:1}
.health-score-label{font-size:10px;color:var(--muted);letter-spacing:2px;font-family:'Share Tech Mono',monospace;margin-top:4px}

/* PROGRESS BAR */
.progress-bar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* CATEGORY COLORS */
.cat-food{color:#ff6b6b}.cat-transport{color:var(--cyan)}.cat-subs{color:var(--purple)}.cat-shopping{color:var(--yellow)}.cat-entertainment{color:#ff9f43}.cat-health{color:var(--green)}.cat-other{color:var(--muted)}

/* TABLE */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:10px 16px;font-size:10px;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-weight:400}
.table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.03);font-size:14px}
.table tr:hover td{background:rgba(255,255,255,.02)}

/* CHAT */
.chat-container{display:flex;flex-direction:column;height:500px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.5}
.chat-bubble.user{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.2);align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.ai{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);align-self:flex-start;border-bottom-left-radius:4px}
.chat-bubble.ai .ai-label{font-size:10px;color:var(--purple);font-family:'Share Tech Mono',monospace;margin-bottom:6px;letter-spacing:1px}
.chat-input-row{display:flex;gap:10px;padding:16px;border-top:1px solid var(--border)}
.chat-input-row .input{flex:1}

/* GAUGE */
.gauge-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.gauge-label{font-size:12px;color:var(--muted);width:90px;flex-shrink:0}
.gauge-track{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px}
.gauge-val{font-size:12px;font-family:'Share Tech Mono',monospace;width:40px;text-align:right;flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--cyan)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px;transition:color .2s}
.modal-close:hover{color:var(--text)}

/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;min-width:260px;max-width:340px}
.toast-success{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.toast-error{background:rgba(255,45,122,.15);border:1px solid rgba(255,45,122,.3);color:var(--pink)}
.toast-info{background:rgba(0,245,255,.15);border:1px solid rgba(0,245,255,.3);color:var(--cyan)}
.toast-warning{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:var(--yellow)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease;min-height:4px}
.bar-label{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;white-space:nowrap}

/* STREAKS */
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.streak-day{width:100%;aspect-ratio:1;border-radius:4px;background:rgba(255,255,255,.04)}
.streak-day.done{background:var(--green);box-shadow:0 0 6px rgba(0,255,136,.4)}
.streak-day.today{border:2px solid var(--cyan)}

/* PREDICTION TIMELINE */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.timeline-item{position:relative;padding:0 0 16px 16px}
.timeline-dot{position:absolute;left:-14px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg2)}
.timeline-item.warn .timeline-dot{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 8px rgba(255,215,0,.5)}
.timeline-item.danger .timeline-dot{background:var(--pink);border-color:var(--pink);box-shadow:0 0 8px rgba(255,45,122,.5)}
.timeline-item.ok .timeline-dot{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.5)}
.timeline-date{font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-bottom:2px}
.timeline-text{font-size:13px}

/* AUTH SCREEN */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,245,255,.08),transparent 70%);pointer-events:none}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 0 40px rgba(0,245,255,.3)}
.auth-title{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:var(--cyan);letter-spacing:3px}
.auth-subtitle{color:var(--muted);font-size:13px;margin-top:6px}
.auth-tabs{display:flex;background:rgba(255,255,255,.03);border-radius:8px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;color:var(--muted)}
.auth-tab.active{background:rgba(0,245,255,.1);color:var(--cyan)}

/* PAGE HEADERS */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:700}
.page-subtitle{color:var(--muted);font-size:13px;margin-top:4px}

/* MISC */
.separator{height:1px;background:var(--border);margin:16px 0}
.text-cyan{color:var(--cyan)}.text-pink{color:var(--pink)}.text-green{color:var(--green)}.text-yellow{color:var(--yellow)}.text-purple{color:var(--purple)}.text-muted{color:var(--muted)}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.flex-1{flex:1}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.w-full{width:100%}.text-sm{font-size:13px}.text-xs{font-size:11px}.font-bold{font-weight:700}.rounded{border-radius:8px}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted)}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ONBOARDING */
.onboarding-step{text-align:center;padding:20px 0}
.step-emoji{font-size:48px;margin-bottom:16px}
.step-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.step-desc{color:var(--muted);font-size:14px;line-height:1.6;max-width:300px;margin:0 auto 24px}
.step-indicators{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.step-dot.active{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* MOOD TRACKER */
.mood-options{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.mood-opt{padding:12px 6px;border-radius:8px;border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .2s;background:transparent}
.mood-opt:hover,.mood-opt.selected{border-color:var(--cyan);background:rgba(0,245,255,.05)}
.mood-emoji{font-size:24px;display:block;margin-bottom:4px}
.mood-label{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace}

/* INSIGHT CARDS */
.insight{display:flex;gap:12px;padding:14px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid var(--border);margin-bottom:10px}
.insight-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.insight-title{font-size:13px;font-weight:700;margin-bottom:2px}
.insight-desc{font-size:12px;color:var(--muted);line-height:1.4}

/* MOBILE MENU */
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;position:fixed;top:16px;left:16px;z-index:200}
@media(max-width:768px){.hamburger{display:flex}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="toast-container" class="toast-container"></div>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext, useMemo } = React;

// ─── UTILITIES ───────────────────────────────────────────────
const CATEGORIES = ['Food','Transport','Subscriptions','Shopping','Entertainment','Health','Education','Other'];
const CAT_ICONS = {Food:'🍜',Transport:'🚌',Subscriptions:'📱',Shopping:'🛍️',Entertainment:'🎮',Health:'💊',Education:'📚',Other:'📦'};
const CAT_COLORS = {Food:'#ff6b6b',Transport:'#00f5ff',Subscriptions:'#a855f7',Shopping:'#ffd700',Entertainment:'#ff9f43',Health:'#00ff88',Education:'#38bdf8',Other:'#64748b'};

function fmt(n){return'₹'+Math.abs(n).toLocaleString('en-IN')}
function fmtDate(d){const dt=new Date(d);return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
function daysSince(d){return Math.floor((Date.now()-new Date(d))/(86400000))}

function genId(){return Math.random().toString(36).slice(2)}

function calcHealthScore(expenses,income,goals){
  if(!expenses.length)return 72;
  const month=new Date();month.setDate(1);
  const monthExp=expenses.filter(e=>new Date(e.date)>=month).reduce((s,e)=>s+e.amount,0);
  const savingsRate=income>0?Math.max(0,(income-monthExp)/income):0;
  const goalsCompleted=goals.filter(g=>g.current>=g.target).length;
  const goalScore=goals.length>0?(goalsCompleted/goals.length):0.5;
  const consistencyDays=[...new Set(expenses.slice(0,30).map(e=>new Date(e.date).toDateString()))].length;
  const consistency=Math.min(consistencyDays/20,1);
  return Math.round(savingsRate*40+goalScore*30+consistency*30);
}

function predictRunout(expenses,balance){
  if(!expenses.length||balance<=0)return null;
  const last30=expenses.filter(e=>daysSince(e.date)<30);
  const avgDaily=last30.reduce((s,e)=>s+e.amount,0)/Math.max(last30.length,1)*0.8;
  if(avgDaily<=0)return null;
  return Math.round(balance/avgDaily);
}

function getInsights(expenses,income){
  const insights=[];
  const cats={};
  expenses.slice(0,50).forEach(e=>{cats[e.category]=(cats[e.category]||0)+e.amount});
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  if(topCat)insights.push({type:'warn',icon:'⚠️',title:`High ${topCat[0]} Spending`,desc:`You've spent ${fmt(topCat[1])} on ${topCat[0]} this period — consider reducing it.`,color:'#ffd700'});
  const subs=expenses.filter(e=>e.category==='Subscriptions');
  if(subs.length>3)insights.push({type:'info',icon:'📱',title:'Subscription Overload',desc:`You have ${subs.length} subscription charges. Audit them for unused services.`,color:'#a855f7'});
  const weekendSpend=expenses.filter(e=>{const d=new Date(e.date).getDay();return d===0||d===6}).reduce((s,e)=>s+e.amount,0);
  const weekdaySpend=expenses.filter(e=>{const d=new Date(e.date).getDay();return d>0&&d<6}).reduce((s,e)=>s+e.amount,0);
  if(weekendSpend>weekdaySpend*0.6)insights.push({type:'warn',icon:'🎉',title:'Weekend Splurge Detected',desc:'Your weekend spending is unusually high. Set a weekend budget cap.',color:'#ff9f43'});
  insights.push({type:'tip',icon:'💡',title:'50-30-20 Rule',desc:'Allocate 50% to needs, 30% to wants, 20% to savings for optimal financial health.',color:'#00f5ff'});
  return insights;
}

// ─── TOAST ───────────────────────────────────────────────────
function showToast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`<span>${{success:'✓',error:'✕',info:'ℹ',warning:'⚡'}[type]||'ℹ'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ─── LOCAL STORAGE DB ────────────────────────────────────────
const DB={
  get(k,def=null){try{const v=localStorage.getItem('bb_'+k);return v?JSON.parse(v):def}catch{return def}},
  set(k,v){try{localStorage.setItem('bb_'+k,JSON.stringify(v))}catch{}},
  del(k){localStorage.removeItem('bb_'+k)}
};

// ─── AI CHAT ENGINE ──────────────────────────────────────────
async function askAI(messages,expenses,balance,income){
  const summary=`User financial context: Balance ₹${balance}, Monthly income ₹${income}. Recent expenses: ${expenses.slice(0,10).map(e=>`${e.category}: ₹${e.amount} on ${fmtDate(e.date)}`).join(', ')}. Total this month: ₹${expenses.filter(e=>daysSince(e.date)<30).reduce((s,e)=>s+e.amount,0)}.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are BrokeBuddy, an AI financial coach for Indian college students. Be concise, friendly, use rupee amounts. ${summary}`,
        messages
      })
    });
    const data=await res.json();
    return data.content?.[0]?.text||"I couldn't process that. Try again!";
  }catch(e){
    return"⚡ AI is temporarily offline. Based on your data: spend less on your top category this week!";
  }
}

// ─── CONTEXT ─────────────────────────────────────────────────
const AppCtx=createContext(null);

// ─── AUTH SCREEN ─────────────────────────────────────────────
function AuthScreen({onLogin}){
  const [tab,setTab]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',income:''});
  const [loading,setLoading]=useState(false);

  function handle(k,v){setForm(p=>({...p,[k]:v}))}

  async function submit(){
    if(!form.email||!form.password){showToast('Please fill all fields','error');return}
    setLoading(true);
    await new Promise(r=>setTimeout(r,800));
    if(tab==='signup'){
      if(!form.name){showToast('Enter your name','error');setLoading(false);return}
      const user={id:genId(),name:form.name,email:form.email,income:+form.income||5000,tier:'free',joinedAt:new Date().toISOString()};
      DB.set('user',user);
      showToast(`Welcome aboard, ${form.name}! 🚀`,'success');
      onLogin(user,true);
    }else{
      const user=DB.get('user');
      if(!user||user.email!==form.email){showToast('No account found. Sign up first!','error');setLoading(false);return}
      showToast(`Welcome back, ${user.name}!`,'success');
      onLogin(user,false);
    }
    setLoading(false);
  }

  return(
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">🤖</div>
          <div className="auth-title">BROKEBUDDY</div>
          <div className="auth-subtitle">Your AI-powered financial survival guide</div>
        </div>
        <div className="auth-tabs">
          {['login','signup'].map(t=>(
            <div key={t} className={`auth-tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{t==='login'?'SIGN IN':'SIGN UP'}</div>
          ))}
        </div>
        {tab==='signup'&&<div className="input-group"><label className="input-label">Your Name</label><input className="input" placeholder="Riya Sharma" value={form.name} onChange={e=>handle('name',e.target.value)}/></div>}
        <div className="input-group"><label className="input-label">Email</label><input className="input" type="email" placeholder="you@college.edu" value={form.email} onChange={e=>handle('email',e.target.value)}/></div>
        <div className="input-group"><label className="input-label">Password</label><input className="input" type="password" placeholder="••••••••" value={form.password} onChange={e=>handle('password',e.target.value)}/></div>
        {tab==='signup'&&<div className="input-group"><label className="input-label">Monthly Income / Allowance (₹)</label><input className="input" type="number" placeholder="5000" value={form.income} onChange={e=>handle('income',e.target.value)}/></div>}
        <button className="btn btn-primary w-full" onClick={submit} disabled={loading} style={{justifyContent:'center',marginTop:'8px'}}>
          {loading?'⟳ Connecting...':tab==='login'?'⚡ SIGN IN':'🚀 GET STARTED'}
        </button>
        <div className="text-center mt-3" style={{color:'var(--muted)',fontSize:'12px',textAlign:'center'}}>
          Demo: Use any email & password to create account
        </div>
      </div>
    </div>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────
function Onboarding({user,onDone}){
  const [step,setStep]=useState(0);
  const steps=[
    {emoji:'🤖',title:'Meet BrokeBuddy',desc:'Your AI money coach that tracks, analyzes, and predicts your spending — so you never run out.'},
    {emoji:'📊',title:'Track Every Rupee',desc:'Add expenses in seconds. We auto-categorize and show you where your money actually goes.'},
    {emoji:'⚡',title:'Get Predictions',desc:'Our AI warns you before you overspend — like a guardian angel for your wallet.'},
    {emoji:'🎮',title:'Level Up Finances',desc:'Earn streaks, hit savings goals, and build your Financial Health Score. Money management made fun!'},
  ];
  const s=steps[step];
  return(
    <div className="auth-screen">
      <div className="auth-card" style={{maxWidth:380}}>
        <div className="step-indicators">
          {steps.map((_,i)=><div key={i} className={`step-dot${i===step?' active':''}`}/>)}
        </div>
        <div className="onboarding-step">
          <div className="step-emoji">{s.emoji}</div>
          <div className="step-title">{s.title}</div>
          <div className="step-desc">{s.desc}</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          {step>0&&<button className="btn btn-outline flex-1" onClick={()=>setStep(p=>p-1)}>← Back</button>}
          <button className="btn btn-primary flex-1" style={{justifyContent:'center'}} onClick={()=>step<steps.length-1?setStep(p=>p+1):onDone()}>
            {step===steps.length-1?'🚀 Let\'s Go!':'Next →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ADD EXPENSE MODAL ────────────────────────────────────────
function AddExpenseModal({onClose,onAdd}){
  const [form,setForm]=useState({amount:'',category:'Food',note:'',date:new Date().toISOString().slice(0,10),isRecurring:false});
  function handle(k,v){setForm(p=>({...p,[k]:v}))}
  function submit(){
    if(!form.amount||isNaN(+form.amount)||+form.amount<=0){showToast('Enter a valid amount','error');return}
    onAdd({id:genId(),amount:+form.amount,category:form.category,note:form.note,date:form.date,isRecurring:form.isRecurring,createdAt:new Date().toISOString()});
    onClose();
    showToast(`₹${form.amount} added to ${form.category}`,'success');
  }
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">ADD EXPENSE</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="input-group"><label className="input-label">Amount (₹)</label><input className="input" type="number" placeholder="0" autoFocus value={form.amount} onChange={e=>handle('amount',e.target.value)}/></div>
        <div className="input-group"><label className="input-label">Category</label>
          <select className="input" value={form.category} onChange={e=>handle('category',e.target.value)}>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="input-group"><label className="input-label">Note (optional)</label><input className="input" placeholder="Zomato order, Rapido ride..." value={form.note} onChange={e=>handle('note',e.target.value)}/></div>
        <div className="input-group"><label className="input-label">Date</label><input className="input" type="date" value={form.date} onChange={e=>handle('date',e.target.value)}/></div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <input type="checkbox" id="rec" checked={form.isRecurring} onChange={e=>handle('isRecurring',e.target.checked)} style={{accentColor:'var(--cyan)'}}/>
          <label htmlFor="rec" style={{fontSize:13,color:'var(--muted)',cursor:'pointer'}}>Recurring expense</label>
        </div>
        <button className="btn btn-primary w-full" style={{justifyContent:'center'}} onClick={submit}>⚡ ADD EXPENSE</button>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────
function Dashboard(){
  const {user,expenses,goals,balance,income}=useContext(AppCtx);
  const healthScore=useMemo(()=>calcHealthScore(expenses,income,goals),[expenses,income,goals]);
  const daysLeft=useMemo(()=>predictRunout(expenses,balance),[expenses,balance]);
  const monthExp=useMemo(()=>expenses.filter(e=>daysSince(e.date)<30).reduce((s,e)=>s+e.amount,0),[expenses]);
  const weekExp=useMemo(()=>expenses.filter(e=>daysSince(e.date)<7).reduce((s,e)=>s+e.amount,0),[expenses]);
  const insights=useMemo(()=>getInsights(expenses,income),[expenses,income]);

  const scoreColor=healthScore>=70?'#00ff88':healthScore>=40?'#ffd700':'#ff2d7a';
  const circumference=2*Math.PI*54;
  const dash=circumference*(healthScore/100);

  // Last 7 days bar chart
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const label=['S','M','T','W','T','F','S'][d.getDay()];
    const total=expenses.filter(e=>new Date(e.date).toDateString()===d.toDateString()).reduce((s,e)=>s+e.amount,0);
    return{label,total,date:d.toDateString()};
  });
  const maxBar=Math.max(...last7.map(d=>d.total),1);

  // Category breakdown
  const catTotals={};
  expenses.filter(e=>daysSince(e.date)<30).forEach(e=>{catTotals[e.category]=(catTotals[e.category]||0)+e.amount});
  const catList=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,4);

  return(
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">DASHBOARD</div>
          <div className="page-subtitle">Welcome back, {user.name} — here's your financial pulse</div>
        </div>
        {daysLeft!==null&&daysLeft<10&&(
          <div className="badge badge-pink" style={{fontSize:12,padding:'6px 12px'}}>
            ⚡ Balance runs out in ~{daysLeft} days
          </div>
        )}
      </div>

      {/* STAT CARDS */}
      <div className="grid-4 mb-4">
        <div className="card">
          <div className="card-title">Current Balance</div>
          <div className="card-value text-cyan">{fmt(balance)}</div>
          <div className="text-xs text-muted mt-1">Updated in real-time</div>
        </div>
        <div className="card">
          <div className="card-title">This Month</div>
          <div className="card-value" style={{color:monthExp>income*0.8?'var(--pink)':'var(--text)'}}>{fmt(monthExp)}</div>
          <div className="progress-bar mt-2"><div className="progress-fill" style={{width:Math.min(monthExp/income*100,100)+'%',background:monthExp>income*0.8?'var(--pink)':'var(--green)'}}/></div>
          <div className="text-xs text-muted mt-1">{Math.round(monthExp/income*100)}% of income</div>
        </div>
        <div className="card">
          <div className="card-title">This Week</div>
          <div className="card-value text-yellow">{fmt(weekExp)}</div>
          <div className="text-xs text-muted mt-1">{expenses.filter(e=>daysSince(e.date)<7).length} transactions</div>
        </div>
        <div className="card">
          <div className="card-title">Streak</div>
          <div className="card-value text-green">{DB.get('streak',0)} 🔥</div>
          <div className="text-xs text-muted mt-1">Days tracked in a row</div>
        </div>
      </div>

      <div className="grid-2 mb-4">
        {/* Health Score Ring */}
        <div className="card" style={{display:'flex',gap:24,alignItems:'center'}}>
          <div>
            <div className="card-title">Financial Health Score</div>
            <div className="health-ring-container" style={{marginTop:8}}>
              <svg className="health-ring-svg" width="140" height="140" viewBox="0 0 140 140">
                <circle cx="70" cy="70" r="54" fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="10"/>
                <circle cx="70" cy="70" r="54" fill="none" stroke={scoreColor} strokeWidth="10"
                  strokeDasharray={`${dash} ${circumference}`} strokeLinecap="round"
                  style={{filter:`drop-shadow(0 0 8px ${scoreColor})`}}/>
              </svg>
              <div className="health-ring-text">
                <div className="health-score-num" style={{color:scoreColor}}>{healthScore}</div>
                <div className="health-score-label">/ 100</div>
              </div>
            </div>
          </div>
          <div style={{flex:1}}>
            {catList.map(([cat,val])=>(
              <div key={cat} className="gauge-bar">
                <div className="gauge-label text-xs">{CAT_ICONS[cat]} {cat}</div>
                <div className="gauge-track"><div className="gauge-fill" style={{width:Math.min(val/monthExp*100,100)+'%',background:CAT_COLORS[cat]}}/></div>
                <div className="gauge-val text-xs" style={{color:CAT_COLORS[cat]}}>{fmt(val)}</div>
              </div>
            ))}
            {catList.length===0&&<div className="text-muted text-sm">No expenses yet this month</div>}

        </div>

        {/* 7-day bar chart */}
        <div className="card">
          <div className="card-title">Daily Spending — Last 7 Days</div>
          <div className="bar-chart mt-3">
            {last7.map((d,i)=>(
              <div key={i} className="bar-col">
                <div className="bar-label text-xs" style={{color:'var(--muted)',fontSize:9}}>{fmt(d.total)}</div>
                <div className="bar" style={{height:d.total?Math.max(d.total/maxBar*90,6)+'px':4+'px',background:d.date===new Date().toDateString()?'var(--cyan)':'rgba(0,245,255,.3)'}}/>
                <div className="bar-label">{d.label}</div>
              </div>

      <div className="card mb-4">
        <div className="card-title mb-3">AI INSIGHTS</div>
        <div className="grid-2">
          {insights.slice(0,4).map((ins,i)=>(
            <div key={i} className="insight">

              <div><div className="insight-title" style={{color:ins.color}}>{ins.title}</div><div className="insight-desc">{ins.desc}</div></div>
            </div>
          ))}
        </div>
      </div>

      {/* RECENT */}
      <div className="card">
        <div className="card-title mb-3">RECENT TRANSACTIONS</div>
        {expenses.length===0?<div className="text-muted text-sm" style={{padding:'20px 0',textAlign:'center'}}>No transactions yet. Add your first expense!</div>:
        <table className="table">
          <thead><tr><th>DATE</th><th>CATEGORY</th><th>NOTE</th><th>AMOUNT</th></tr></thead>
          <tbody>
            {expenses.slice(0,8).map(e=>(
              <tr key={e.id}>
                <td className="text-muted" style={{fontSize:12,fontFamily:"'Share Tech Mono',monospace"}}>{fmtDate(e.date)}</td>
                <td><span className="badge" style={{background:CAT_COLORS[e.category]+'22',color:CAT_COLORS[e.category],border:`1px solid ${CAT_COLORS[e.category]}44`}}>{CAT_ICONS[e.category]} {e.category}</span></td>
                <td className="text-sm text-muted">{e.note||'—'}</td>
                <td className="text-pink font-bold" style={{fontFamily:"'Share Tech Mono',monospace"}}>-{fmt(e.amount)}</td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>
    </div>
  );
}

// ─── EXPENSES PAGE ────────────────────────────────────────────
function ExpensesPage(){
  const {expenses,deleteExpense}=useContext(AppCtx);
  const [showModal,setShowModal]=useState(false);
  const {addExpense}=useContext(AppCtx);
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('date');

  const filtered=useMemo(()=>{
    let ex=[...expenses];
    if(filter!=='All')ex=ex.filter(e=>e.category===filter);
    if(search)ex=ex.filter(e=>e.note?.toLowerCase().includes(search.toLowerCase())||e.category.toLowerCase().includes(search.toLowerCase()));
    if(sort==='date')ex.sort((a,b)=>new Date(b.date)-new Date(a.date));
    else if(sort==='amount')ex.sort((a,b)=>b.amount-a.amount);
    return ex;
  },[expenses,filter,search,sort]);

  return(
    <div>
      <div className="page-header">
        <div><div className="page-title">EXPENSES</div><div className="page-subtitle">{expenses.length} total transactions</div></div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ ADD EXPENSE</button>
      </div>
      <div className="card mb-4">
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
          <input className="input" style={{maxWidth:200}} placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="input" style={{maxWidth:160}} value={filter} onChange={e=>setFilter(e.target.value)}>
            <option>All</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
          <select className="input" style={{maxWidth:140}} value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="date">Latest First</option>
            <option value="amount">Highest Amount</option>
          </select>
        </div>
      </div>
      <div className="card">
        {filtered.length===0?<div style={{padding:'40px 0',textAlign:'center',color:'var(--muted)'}}>No transactions found</div>:
        <table className="table">
          <thead><tr><th>DATE</th><th>CATEGORY</th><th>NOTE</th><th>AMOUNT</th><th>TYPE</th><th></th></tr></thead>
          <tbody>
            {filtered.map(e=>(
              <tr key={e.id}>
                <td className="text-muted" style={{fontSize:12,fontFamily:"'Share Tech Mono',monospace"}}>{fmtDate(e.date)}</td>
                <td><span className="badge" style={{background:CAT_COLORS[e.category]+'22',color:CAT_COLORS[e.category],border:`1px solid ${CAT_COLORS[e.category]}44`}}>{CAT_ICONS[e.category]} {e.category}</span></td>
                <td className="text-sm">{e.note||<span style={{color:'var(--muted)'}}>—</span>}</td>
                <td style={{fontFamily:"'Share Tech Mono',monospace",color:'var(--pink)',fontWeight:700}}>-{fmt(e.amount)}</td>
                <td>{e.isRecurring?<span className="badge badge-purple">RECURRING</span>:<span className="badge" style={{background:'rgba(255,255,255,.05)',color:'var(--muted)',border:'1px solid var(--border)'}}>ONE-TIME</span>}</td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>{deleteExpense(e.id);showToast('Expense deleted','info')}}>✕</button></td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>
      {showModal&&<AddExpenseModal onClose={()=>setShowModal(false)} onAdd={addExpense}/>}
    </div>
  );
}

// ─── ANALYTICS PAGE ───────────────────────────────────────────
function AnalyticsPage(){
  const {expenses,income,balance}=useContext(AppCtx);
  const daysLeft=predictRunout(expenses,balance);

  const monthly=useMemo(()=>{
    const map={};
    expenses.forEach(e=>{
      const key=new Date(e.date).toLocaleDateString('en-IN',{month:'short',year:'2-digit'});
      map[key]=(map[key]||0)+e.amount;
    });
    return Object.entries(map).slice(-6).reverse();
  },[expenses]);

  const catTotals=useMemo(()=>{
    const map={};
    expenses.filter(e=>daysSince(e.date)<30).forEach(e=>{map[e.category]=(map[e.category]||0)+e.amount});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[expenses]);

  const totalMonth=catTotals.reduce((s,[,v])=>s+v,0);
  const maxMonthly=Math.max(...monthly.map(([,v])=>v),1);

  // Prediction timeline
  const timeline=[];
  if(daysLeft!==null){
    if(daysLeft>14)timeline.push({type:'ok',days:7,text:'Spending on track for this week'});
    if(daysLeft<20)timeline.push({type:'warn',days:Math.min(daysLeft,20),text:`⚠️ Spending velocity is high — slow down`});
    if(daysLeft<10)timeline.push({type:'danger',days:daysLeft,text:`🚨 Balance may hit zero in ~${daysLeft} days`});
    else timeline.push({type:'ok',days:daysLeft,text:`💚 Balance lasts ~${daysLeft} more days at current pace`});
  }

  return(
    <div>
      <div className="page-header"><div><div className="page-title">ANALYTICS</div><div className="page-subtitle">Deep dive into your spending patterns</div></div></div>
      <div className="grid-2 mb-4">
        <div className="card">
          <div className="card-title mb-3">MONTHLY SPENDING TREND</div>
          {monthly.length===0?<div className="text-muted text-sm">Not enough data yet</div>:
          <div className="bar-chart" style={{height:140}}>
            {monthly.map(([label,val],i)=>(
              <div key={i} className="bar-col">
                <div className="bar-label" style={{fontSize:9,color:'var(--muted)'}}>{fmt(val)}</div>
                <div className="bar" style={{height:Math.max(val/maxMonthly*120,6)+'px',background:`linear-gradient(to top,var(--cyan),var(--purple))`}}/>
                <div className="bar-label" style={{fontSize:9}}>{label}</div>
              </div>
            ))}
          </div>}
        </div>
        <div className="card">
          <div className="card-title mb-3">CATEGORY BREAKDOWN — THIS MONTH</div>
          {catTotals.length===0?<div className="text-muted text-sm">No data this month</div>:
          catTotals.map(([cat,val])=>(
            <div key={cat} className="gauge-bar">
              <div style={{width:120,fontSize:12,display:'flex',alignItems:'center',gap:4}}><span>{CAT_ICONS[cat]}</span><span>{cat}</span></div>
              <div className="gauge-track"><div className="gauge-fill" style={{width:Math.min(val/totalMonth*100,100)+'%',background:CAT_COLORS[cat]}}/></div>
              <div style={{width:60,textAlign:'right',fontSize:11,fontFamily:"'Share Tech Mono',monospace",color:CAT_COLORS[cat]}}>{fmt(val)}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-title mb-3">BALANCE FORECAST TIMELINE</div>
          {timeline.length===0?<div className="text-muted text-sm">Add more expenses for predictions</div>:
          <div className="timeline">
            {timeline.map((t,i)=>(
              <div key={i} className={`timeline-item ${t.type}`}>
                <div className="timeline-dot"/>
                <div className="timeline-date font-mono">+{t.days} days</div>
                <div className="timeline-text text-sm">{t.text}</div>
              </div>
            ))}
          </div>}
        </div>
        <div className="card">
          <div className="card-title mb-3">SPENDING STATS</div>
          {[
            ['Avg. Daily Spend',expenses.length?fmt(expenses.filter(e=>daysSince(e.date)<30).reduce((s,e)=>s+e.amount,0)/30):'—'],
            ['Biggest Expense',expenses.length?fmt(Math.max(...expenses.map(e=>e.amount))):'—'],
            ['Total Transactions',expenses.length],
            ['Recurring Expenses',expenses.filter(e=>e.isRecurring).length],

// ─── CHAT PAGE ────────────────────────────────────────────────
function ChatPage(){
  const {expenses,balance,income}=useContext(AppCtx);
  const [messages,setMessages]=useState([{role:'assistant',content:"Hey! I'm BrokeBuddy 🤖 Your AI financial coach. Ask me anything — 'Can I afford this?', 'Where am I overspending?', or 'Give me a savings plan!'"}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[messages]);

  const QUICK=['Can I afford ₹500 this week?','Where am I overspending?','Give me a savings plan','Predict my month-end balance','How to improve my score?'];

  async function send(text){
    const msg=text||input.trim();
    if(!msg||loading)return;
    setInput('');
    const userMsg={role:'user',content:msg};
    setMessages(p=>[...p,userMsg]);
    setLoading(true);
    const apiMsgs=[...messages.filter(m=>m.role!=='system'),userMsg].map(m=>({role:m.role,content:m.content}));
    const reply=await askAI(apiMsgs,expenses,balance,income);
    setMessages(p=>[...p,{role:'assistant',content:reply}]);
    setLoading(false);
  }

  return(
    <div>
      <div className="page-header"><div><div className="page-title">AI CHAT</div><div className="page-subtitle">Ask BrokeBuddy anything about your finances</div></div></div>
      <div className="card">
        <div className="chat-container">
          <div className="chat-messages">
            {messages.map((m,i)=>(
              <div key={i} className={`chat-bubble ${m.role==='user'?'user':'ai'}`}>
                {m.role==='assistant'&&<div className="ai-label">🤖 BROKEBUDDY</div>}
                <div style={{whiteSpace:'pre-wrap'}}>{m.content}</div>
              </div>
            ))}
            {loading&&<div className="chat-bubble ai"><div className="ai-label">🤖 BROKEBUDDY</div><div className="pulse text-muted">Analyzing your finances...</div></div>}
            <div ref={bottomRef}/>
          </div>
          <div style={{padding:'8px 16px',display:'flex',gap:8,flexWrap:'wrap',borderTop:'1px solid var(--border)'}}>
            {QUICK.map(q=>(
              <button key={q} className="btn btn-outline btn-sm" onClick={()=>send(q)} style={{fontSize:11}}>{q}</button>
            ))}
          </div>
          <div className="chat-input-row">
            <input className="input" placeholder="Ask about your finances..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
            <button className="btn btn-primary" onClick={()=>send()} disabled={loading}>⚡ SEND</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MoodPage(){
  const {expenses}=useContext(AppCtx);
  const [moods,setMoods]=useState(()=>DB.get('moods',[]));
  const [todayMood,setTodayMood]=useState('');
  const [note,setNote]=useState('');

  const moodOpts=[{e:'😭',l:'Broke AF'},{e:'😟',l:'Stressed'},{e:'😐',l:'Meh'},{e:'😊',l:'Okay'},{e:'🤑',l:'Rich Mode'}];
  const todayStr=new Date().toDateString();
  const todayEntry=moods.find(m=>m.date===todayStr);

  function saveMood(){
    if(!todayMood){showToast('Select a mood first','error');return}
    const entry={id:genId(),date:todayStr,mood:todayMood,note,spentToday:expenses.filter(e=>new Date(e.date).toDateString()===todayStr).reduce((s,e)=>s+e.amount,0)};
    const updated=[...moods.filter(m=>m.date!==todayStr),entry];
    setMoods(updated);DB.set('moods',updated);
    showToast('Mood logged! 💜','success');
  }

  const correlation=useMemo(()=>{
    const data=moods.map(m=>({mood:moodOpts.findIndex(o=>o.e===m.mood),spent:m.spentToday}));
    if(data.length<3)return null;
    const avgSpentBad=data.filter(d=>d.mood<=1).reduce((s,d)=>s+d.spent,0)/Math.max(data.filter(d=>d.mood<=1).length,1);
    const avgSpentGood=data.filter(d=>d.mood>=3).reduce((s,d)=>s+d.spent,0)/Math.max(data.filter(d=>d.mood>=3).length,1);
    return{bad:Math.round(avgSpentBad),good:Math.round(avgSpentGood)};
  },[moods]);

  return(
    <div>
      <div className="page-header"><div><div className="page-title">MOOD TRACKER</div><div className="page-subtitle">Discover how emotions affect your spending</div></div></div>
      <div className="grid-2 mb-4">
        <div className="card">
          <div className="card-title mb-3">HOW ARE YOU FEELING TODAY?</div>
          {todayEntry?<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:48}}>{todayEntry.mood}</div>
            <div className="text-cyan mt-2">Today's mood logged ✓</div>
            <div className="text-muted text-sm mt-1">{todayEntry.note||'No note added'}</div>
          </div>:<>
            <div className="mood-options mb-4">
              {moodOpts.map(m=>(
                <div key={m.e} className={`mood-opt${todayMood===m.e?' selected':''}`} onClick={()=>setTodayMood(m.e)}>
                  <span className="mood-emoji">{m.e}</span>
                  <span className="mood-label">{m.l}</span>
                </div>
              ))}
            </div>
            <input className="input mb-3" placeholder="Any note? (optional)" value={note} onChange={e=>setNote(e.target.value)}/>
            <button className="btn btn-primary w-full" style={{justifyContent:'center'}} onClick={saveMood}>💜 LOG MOOD</button>
          </>}
        </div>
        <div className="card">
          <div className="card-title mb-3">EMOTION-SPENDING CORRELATION</div>
          {!correlation?<div className="text-muted text-sm" style={{padding:'20px 0',textAlign:'center'}}>Log moods for 3+ days to see patterns</div>:<>
            <div className="insight" style={{marginBottom:12}}>
              <div className="insight-icon" style={{background:'rgba(255,45,122,.2)'}}>😟</div>
              <div><div className="insight-title text-pink">Bad Days</div><div className="insight-desc">Avg spend: <strong>{fmt(correlation.bad)}</strong> when stressed/sad</div></div>
            </div>
            <div className="insight">
              <div className="insight-icon" style={{background:'rgba(0,255,136,.2)'}}>😊</div>
              <div><div className="insight-title text-green">Good Days</div><div className="insight-desc">Avg spend: <strong>{fmt(correlation.good)}</strong> when happy</div></div>
            </div>
            {correlation.bad>correlation.good&&<div className="badge badge-yellow mt-3" style={{fontSize:11,padding:'6px 10px'}}>⚠️ You spend {fmt(correlation.bad-correlation.good)} more when stressed</div>}
          </>}
        </div>
      </div>
      <div className="card">
        <div className="card-title mb-3">MOOD HISTORY</div>
        {moods.length===0?<div className="text-muted text-sm" style={{textAlign:'center',padding:'20px 0'}}>No mood entries yet</div>:
        <table className="table">
          <thead><tr><th>DATE</th><th>MOOD</th><th>NOTE</th><th>SPENT THAT DAY</th></tr></thead>
          <tbody>
            {[...moods].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(m=>(
              <tr key={m.id}>
                <td className="text-muted font-mono" style={{fontSize:12}}>{new Date(m.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</td>
                <td style={{fontSize:20}}>{m.mood}</td>
                <td className="text-sm text-muted">{m.note||'—'}</td>
                <td className="text-pink font-mono text-sm">{fmt(m.spentToday)}</td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>DB.get('user',null));
  const [page,setPage]=useState('dashboard');
  const [onboarded,setOnboarded]=useState(()=>DB.get('onboarded',false));
  const [showAddExp,setShowAddExp]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);

  // State
  const [expenses,setExpenses]=useState(()=>DB.get('expenses',[]));
  const [goals,setGoals]=useState(()=>DB.get('goals',[]));
  const [income,setIncome]=useState(()=>DB.get('income',5000));
  const [balance,setBalance]=useState(()=>DB.get('balance',8000));

  // Update streak on expense add
  useEffect(()=>{
    const lastDay=DB.get('lastTracked','');
    const today=new Date().toDateString();
    if(expenses.some(e=>new Date(e.date).toDateString()===today)&&lastDay!==today){
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const streak=DB.get('streak',0);
      DB.set('streak',lastDay===yesterday.toDateString()?streak+1:1);
      DB.set('lastTracked',today);
    }
  },[expenses]);

  function addExpense(e){
    const upd=[e,...expenses];setExpenses(upd);DB.set('expenses',upd);
    setBalance(b=>{const nb=b-e.amount;DB.set('balance',nb);return nb});
  }
  function deleteExpense(id){
    const exp=expenses.find(e=>e.id===id);
    if(exp){setBalance(b=>{const nb=b+exp.amount;DB.set('balance',nb);return nb})}
    const upd=expenses.filter(e=>e.id!==id);setExpenses(upd);DB.set('expenses',upd);
  }
  function addGoal(g){const upd=[...goals,g];setGoals(upd);DB.set('goals',upd)}
  function updateGoal(id,data){const upd=goals.map(g=>g.id===id?{...g,...data}:g);setGoals(upd);DB.set('goals',upd)}
  function deleteGoal(id){const upd=goals.filter(g=>g.id!==id);setGoals(upd);DB.set('goals',upd)}
  function logout(){DB.del('user');setUser(null)}

  const ctx={user,expenses,goals,income,balance,addExpense,deleteExpense,addGoal,updateGoal,deleteGoal,setIncome,setBalance,logout};

  if(!user)return <AuthScreen onLogin={(u,isNew)=>{setUser(u);if(isNew)setOnboarded(false)}}/>;
  if(!onboarded)return <Onboarding user={user} onDone={()=>{setOnboarded(true);DB.set('onboarded',true)}}/>;

  const NAV=[
    {id:'dashboard',icon:'⬡',label:'DASHBOARD'},
    {id:'expenses',icon:'⊞',label:'EXPENSES'},
    {id:'analytics',icon:'⟋',label:'ANALYTICS'},
    {id:'chat',icon:'⊙',label:'AI CHAT'},
    {id:'goals',icon:'◈',label:'GOALS'},
    {id:'mood',icon:'◉',label:'MOOD'},
    {id:'budget',icon:'⊡',label:'BUDGETS'},
    {id:'settings',icon:'⊗',label:'SETTINGS'},
  ];

  const pages={dashboard:<Dashboard/>,expenses:<ExpensesPage/>,analytics:<AnalyticsPage/>,chat:<ChatPage/>,goals:<GoalsPage/>,mood:<MoodPage/>,budget:<BudgetPage/>,settings:<SettingsPage/>};

  return(
    <AppCtx.Provider value={ctx}>
      <div className="app">
        <button className="hamburger" onClick={()=>setSidebarOpen(p=>!p)}>☰</button>
        {sidebarOpen&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:99}} onClick={()=>setSidebarOpen(false)}/>}
        <div className={`sidebar${sidebarOpen?' open':''}`}>
          <div className="logo">
            <div className="logo-icon">🤖</div>
            <div className="logo-text">BROKEBUDDY</div>
          </div>
          <div className="nav">
            {NAV.map(n=>(
              <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>{setPage(n.id);setSidebarOpen(false)}}>
                <span className="nav-icon font-mono">{n.icon}</span>
                <span style={{fontSize:12,letterSpacing:1}}>{n.label}</span>
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <button className="btn btn-primary w-full" style={{justifyContent:'center',marginBottom:12,fontSize:12}} onClick={()=>{setShowAddExp(true);setSidebarOpen(false)}}>+ QUICK ADD</button>
            <div className="user-info">
              <div className="avatar">{user.name[0].toUpperCase()}</div>
              <div className="user-details">
                <div className="user-name">{user.name}</div>
                <div className="user-tier">{user.tier?.toUpperCase()||'FREE'} TIER</div>
              </div>
            </div>
          </div>
        </div>
        <div className="main">
          {pages[page]||<Dashboard/>}
        </div>
        {showAddExp&&<AddExpenseModal onClose={()=>setShowAddExp(false)} onAdd={addExpense}/>}
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
